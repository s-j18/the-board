name: Deploy PartyKit

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Write PartyKit config
        run: |
          mkdir -p ~/.partykit
          echo '{"login":"s-j18","access_token":"${{ secrets.PARTYKIT_API_KEY }}","type":"clerk","username":"s-j18","team":"s-j18"}' > ~/.partykit/config.json

      - run: npx partykit deploy